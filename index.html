<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOURI SHANKAR DAS | Hypno-Mentalist</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #08080c;
            color: #e2e8f0;
            margin: 0;
        }

        /* Navigation */
        nav {
            background: rgba(8, 8, 12, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .nav-link {
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 700;
            color: white;
            padding: 10px 14px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .nav-link:hover {
            background: #a855f7;
        }

        /* Scroll animation */
        .animate-on-scroll {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease-out;
        }

        .animate-on-scroll.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Image cards */
        .img-card {
            width: 100%;
            aspect-ratio: 3/4;
            overflow: hidden;
            border-radius: 12px;
            background: #111;
        }

        /* Video Grid FIXED */
        #video-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            #video-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        #image-modal.active {
            display: flex;
        }
    </style>
</head>

<body class="min-h-screen">

<!-- NAVBAR -->
<nav class="fixed top-0 left-0 right-0 z-50 py-3">
    <div class="flex justify-center gap-4">
        <a href="#performances" class="nav-link">Reels</a>
        <a href="#persona-gallery" class="nav-link">Persona</a>
        <a href="#public-gallery" class="nav-link">Gallery</a>
    </div>
</nav>

<!-- SPACING FIX -->
<div class="h-20"></div>

<!-- REELS SECTION -->
<section id="performances" class="py-16 px-4 max-w-6xl mx-auto animate-on-scroll">
    <h2 class="text-center text-3xl font-bold mb-10">Performance Reels</h2>

    <div id="video-grid">
        <p class="text-center text-gray-500 col-span-full">Loading reels...</p>
    </div>
</section>

<!-- PERSONA -->
<section id="persona-gallery" class="py-16 px-4 max-w-6xl mx-auto animate-on-scroll">
    <h2 class="text-center text-3xl font-bold mb-10">Artist Persona</h2>

    <div id="persona-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <p class="text-gray-500 col-span-full text-center">Loading images...</p>
    </div>
</section>

<!-- PUBLIC GALLERY -->
<section id="public-gallery" class="py-16 px-4 max-w-6xl mx-auto animate-on-scroll">
    <h2 class="text-center text-3xl font-bold mb-10">Public Performances</h2>

    <div id="public-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <p class="text-gray-500 col-span-full text-center">Loading images...</p>
    </div>
</section>

<!-- IMAGE MODAL -->
<div id="image-modal" class="fixed inset-0 bg-black/95 hidden items-center justify-center z-50 p-4">
    <button id="close-modal" class="absolute top-6 right-6 text-white text-2xl">✕</button>
    <img id="modal-img" src="" class="max-w-full max-h-[90vh] rounded-xl">
</div>

<!-- SCRIPTS -->
<script src="script.js"></script>

<!-- Instagram Embed FIX -->
<script async src="https://www.instagram.com/embed.js"></script>

</body>
</html>
